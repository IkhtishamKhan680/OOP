name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Compile all cpp files
      run: |
        # Find all .cpp files and try to compile them individually
        for file in $(find . -name "*.cpp"); do
          echo "Compiling: $file"
          g++ -std=c++17 -c "$file" -o "${file%.cpp}.o" || true
        done
